<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM manipulation</title>
</head>

<body>
    <!-- example 1 inner html -->
    <h1 id="title">Hello, its Tanaya</h1>
    <button onclick="changeText()">Change Text</button>
    <script>
        function changeText() {
            document.getElementById("title").innerHTML = "Welcome to DOM manipulation";
        }
    </script>

    <!-- example 2 color change -->
    <h1 id="msg">color change on click</h1>
    <button onclick="changeColor()">Change Color</button>
    <script>
        function changeColor() {
            document.getElementById("msg").style.color = "cadetblue";
        }
    </script>
    <hr>

    <!-- example 3 image change-->
    <img src="images/camera.jpg" alt="camera" id="Myimg" width="200px" height="200px">
    <button onclick="changeImage()">Change Image</button>
    <script>
        function changeImage() {
            document.getElementById("Myimg").src = "images/restaurant.jpg";
        }
    </script>
    <hr>
    <!-- example 4 display name -->
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <button onclick="showName()">Submit</button>
    <h3 id="output"></h3>

    <script>function showName() {
            let name = document.getElementById("nameInput").value;
            document.getElementById("output").innerHTML = "Hello, " + name;
        }
    </script>

    <!-- example 5 remove/delete text -->
    <hr>
    <p id="deleteMe">Lorem ipsum dolor sit amet!</p>
    <button onclick="deleteText()">Delete Text</button>
    <script>
        function deleteText() {
            document.getElementById("deleteMe").remove();
        }
    </script>


    <!-- example 6 font size manipulation -->
    <hr>
    <p id="para">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    <button onclick="increase()">+</button>
    <button onclick="decrease()">-</button>
    <script>
        let size = 16;
        function increase() {
            size++;
            document.getElementById("para").style.fontSize = size + "px";
        }
        function decrease() {
            size--;
            document.getElementById("para").style.fontSize = size + "px";
        }
    </script>
    
    <!-- example 7 toggle theme -->
    <hr>
    <button onclick="toggleTheme()">Toggle Theme</button>
    <style>
        body {
            background-color: white;
            color: black;
        }

        .dark-theme {
            background-color: black;
            color: white;
        }
    </style>
    <script>
        function toggleTheme() {
            document.body.classList.toggle("dark-theme");
        }
    </script>


</body>

</html>
