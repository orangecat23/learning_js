<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var a = Math.round(10.4);
        document.write(" round of 10.4 : " + a + '<br>');
        var a = Math.trunc(10.6); //doesn't check value after decimal
        document.write(" trunc of 10.6 : " + a + '<br>');
        var a = Math.ceil(10.1); //nearest upper value
        document.write(" ceil of 10.1 : " + a + '<br>');
        var a = Math.floor(6.9);
        document.write(" floor of 6.9 : " + a + '<br>');
        var a = Math.max(10.6, 23, 23, 57, 40.4);
        document.write(" max of 10.6,23,23,57,40.4 : " + a + '<br>');
        var a = Math.min(10.6, 23, 23, 57, 40.4);
        document.write(" min of 10.6,23,23,57,40.4 : " + a + '<br>');
        var f=Math.sqrt(81);
        document.write(" sqrt of 81 : " + f + '<br>');
        var f=Math.cbrt(125);
        document.write(" cbrt of 125 : " + f + '<br>');


    </script>

</body>

</html>
