<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataTypes</title>
</head>

<body>
    <script>
        var a = "Tanaya"; //string
        var b = 123.89; //number
        var c = true; //boolean
        var d = ["HTML", "CSS", "Bootstrap", "JS"]; //object
        var e = { fname: "Tanaya", lname: "Ramgir" }; //object
        var f = null; //object
        var g; //undefined

        document.write(a + "<br>");
        document.write(typeof a + "<br>");
        document.write(b + "<br>"); 
        document.write(typeof b + "<br>");  
        document.write(d + "<br>");
        document.write(typeof d + "<br>");  
        document.write(e + "<br>");
        document.write(typeof e + "<br>");
        document.write(f + "<br>");
        document.write(typeof f + "<br>");
        document.write(g + "<br>");
        document.write(typeof g + "<br>");  

    </script>

</body>

</html>
