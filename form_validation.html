<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <main>
        <section>
            <div class="container">
                <div class="row">
                    <div class="col-md-6 border border-primary mt-2">
                        <form>
                            <h3 class="text-center mt-3">Contact Us</h3>
                            <div class="mb-3">
                                <label for="name" class="form-label">Name: </label>
                                <input type="text" placeholder="Your name" class="form-control" id="name" name="name">
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email: </label>
                                <input type="email" placeholder="Your email" class="form-control" id="email"
                                    name="email">
                            </div>
                            <div class="mb-3">
                                <label for="mobileNumber" class="form-label">Mobile Number: </label>
                                <input type="tel" placeholder="Your mobile number" class="form-control"
                                    id="mobileNumber" name="mobileNumber">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password: </label>
                                <input type="password" placeholder="Your password" class="form-control" id="password"
                                    name="password">
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password: </label>
                                <input type="password" placeholder="Confirm your password" class="form-control"
                                    id="confirmPassword" name="confirmPassword">
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message:</label>
                                <textarea class="form-control" id="message" name="message" rows="4"
                                    placeholder="Your message"></textarea>
                            </div>
                            <!-- gender section start -->
                            <div class="mb-3">
                                <label class="form-label d-block">Gender:</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderMale"
                                        value="male">
                                    <label class="form-check-label" for="genderMale">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderFemale"
                                        value="female">
                                    <label class="form-check-label" for="genderFemale">Female</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="genderOther"
                                        value="other">
                                    <label class="form-check-label" for="genderOther">Other</label>
                                </div>
                            </div>
                            <!-- gender section end -->
                            <!-- checkbox section start -->
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="termsAgree" name="termsAgree"
                                        required>
                                    <label class="form-check-label" for="termsAgree">
                                        I agree to the <a href="#" class="text-decoration-none">terms & conditions</a>
                                    </label>
                                </div>
                            </div>

                            <!-- checkbox ends -->
                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary w-100">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
