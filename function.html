<body>
    <script>
        function hello() {
            document.write("This is the function definition." + "<br>");
        }
        hello();
        hello();
        hello(); //function call


    </script>

    <script>

        function sum(a, b, c) {
            document.write(a + b + c + "<br>");
        }
        sum(20, 5, 2);
        sum(44, 15, 2);
    </script>

</body>
